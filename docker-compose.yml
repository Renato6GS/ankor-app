# V1, V2, V5 (INTENCIONAL):
#   - V1: app servida en HTTP plano, sin TLS y sin Nginx al frente.
#   - V2: puerto 3000 publicado directamente al host (sin reverse proxy).
#   - V5: credenciales de Postgres en texto plano dentro del compose.
# Mitigación posterior: añadir servicio nginx con TLS (Luis), mover secretos
# a Docker secrets / .env fuera del repo (Andrea), y dejar el puerto 3000
# escuchando solo en la red interna (sin "ports:" en el servicio app).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      NODE_ENV: production
    depends_on:
      - db
    # sin ports: app solo es accesible desde la red interna (vía Nginx)

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ankor.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app

volumes:
  pgdata:
